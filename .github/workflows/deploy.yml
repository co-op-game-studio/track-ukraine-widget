name: Deploy

# Branch → environment mapping (FR-26):
#   develop → dev    (gated — manual approval)
#   uat     → uat    (gated — manual approval)
#   stg     → stg    (gated — manual approval)
#   prod    → prod   (gated — manual approval)
#
# Feature work lives on feature/* branches — no deploy workflow fires for those.
# Everything flows the same pipeline: typecheck → test → build → upload R2 → deploy Worker.
# Only the `wrangler-env`, `bucket-suffix`, and `github-env` matrix values differ.

on:
  push:
    branches: [prod, stg, uat, develop]
  workflow_dispatch:
    inputs:
      env:
        description: "Which environment to deploy"
        required: true
        type: choice
        options: [dev, uat, stg, prod]

concurrency:
  # One deploy per env at a time; queue, don't cancel in-flight.
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    # Map the triggering branch (or workflow_dispatch input) to an env set.
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.pick.outputs.env_name }}
      wrangler_env: ${{ steps.pick.outputs.wrangler_env }}
      bucket: ${{ steps.pick.outputs.bucket }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            E="${{ inputs.env }}"
          else
            case "${{ github.ref_name }}" in
              prod)    E=prod ;;
              stg)     E=stg  ;;
              uat)     E=uat  ;;
              develop) E=dev  ;;
              *) echo "No env mapping for branch ${{ github.ref_name }}"; exit 1 ;;
            esac
          fi

          case "$E" in
            prod) WRANGLER_ENV=""    BUCKET="voter-info-widget-assets"     ;;
            stg)  WRANGLER_ENV="stg" BUCKET="voter-info-widget-assets-stg" ;;
            uat)  WRANGLER_ENV="uat" BUCKET="voter-info-widget-assets-uat" ;;
            dev)  WRANGLER_ENV="dev" BUCKET="voter-info-widget-assets-dev" ;;
          esac

          echo "env_name=$E"               >> "$GITHUB_OUTPUT"
          echo "wrangler_env=$WRANGLER_ENV" >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET"            >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.resolve.outputs.env_name }}
    env:
      WRANGLER_ENV: ${{ needs.resolve.outputs.wrangler_env }}
      BUCKET: ${{ needs.resolve.outputs.bucket }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build widget bundle
        run: npm run build:lib

      - name: Check build outputs
        run: |
          test -f dist/voter-info-widget.iife.js || (echo "widget bundle missing" && exit 1)
          test -f src/data/ukraineBills.json     || (echo "ukraineBills.json missing" && exit 1)
          test -f src/data/ukraineVotes.json     || (echo "ukraineVotes.json missing" && exit 1)

      - name: Upload widget bundle to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put ${{ env.BUCKET }}/voter-info-widget.iife.js
            --file dist/voter-info-widget.iife.js
            --content-type "application/javascript; charset=utf-8"
            --cache-control "public, max-age=600"
            --remote

      - name: Upload ukraineBills.json to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put ${{ env.BUCKET }}/ukraineBills.json
            --file src/data/ukraineBills.json
            --content-type "application/json; charset=utf-8"
            --cache-control "public, max-age=600"
            --remote

      - name: Upload ukraineVotes.json to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put ${{ env.BUCKET }}/ukraineVotes.json
            --file src/data/ukraineVotes.json
            --content-type "application/json; charset=utf-8"
            --cache-control "public, max-age=600"
            --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # CONGRESS_API_KEY is set once per-env via `wrangler secret put` —
          # not rotated on every deploy.
          command: deploy ${{ env.WRANGLER_ENV && format('--env {0}', env.WRANGLER_ENV) || '' }}

      # Post-deploy smoke test — hits the real edge to confirm the Worker
      # actually responds. Non-prod is gated by Cloudflare Access (FR-29 /
      # ADR-008), so we carry service-token headers for dev/uat/stg and
      # hit prod without auth.
      #
      # Expressed as a single bash block so the auth-header composition
      # is visible at a glance.
      - name: Post-deploy smoke
        env:
          ENV_NAME: ${{ needs.resolve.outputs.env_name }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        shell: bash
        run: |
          case "$ENV_NAME" in
            prod) HOST="https://vote.cogs.it.com"; AUTH_HEADERS=() ;;
            dev)  HOST="https://dev.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            uat)  HOST="https://uat.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            stg)  HOST="https://stg.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            *) echo "Unknown ENV_NAME=$ENV_NAME"; exit 1 ;;
          esac

          # Fail loud if non-prod deploy but secrets missing.
          if [[ "$ENV_NAME" != "prod" && -z "$CF_ACCESS_CLIENT_ID" ]]; then
            echo "::error::CF_ACCESS_CLIENT_ID not set — non-prod smoke will hit Access challenge"
            exit 1
          fi

          echo "Smoking $HOST"

          # 1. Static bundle shipped.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" "$HOST/voter-info-widget.iife.js")
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Bundle fetch returned $STATUS (expected 200)"; exit 1
          fi

          # 2. API proxies with allowed Origin.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
            -H "Origin: https://trackukraine.com" \
            "$HOST/api/census/geocoder/geographies/onelineaddress?address=1600+Pennsylvania+Ave+NW+Washington+DC+20500&benchmark=Public_AR_Current&vintage=Current_Current&format=json")
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Census API returned $STATUS (expected 200)"; exit 1
          fi

          # 3. Origin enforcement — disallowed origin should 403.
          #    Only run against prod/stg/uat (dev has permissive CORS).
          if [[ "$ENV_NAME" != "dev" ]]; then
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
              -H "Origin: https://evil.example.com" "$HOST/api/census/x")
            if [[ "$STATUS" != "403" ]]; then
              echo "::error::Disallowed origin returned $STATUS (expected 403)"; exit 1
            fi
          fi

          # 4. Non-v3 congress path must 400 (AC-27.6) and NOT send our key upstream.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
            -H "Origin: https://trackukraine.com" "$HOST/api/congress/admin")
          if [[ "$STATUS" != "400" ]]; then
            echo "::error::Non-v3 congress path returned $STATUS (expected 400)"; exit 1
          fi

          echo "Smoke passed for $ENV_NAME @ $HOST"
