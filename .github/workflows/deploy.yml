name: Deploy

# Branch → environment mapping (FR-26):
#   develop → dev    (ungated per current session)
#   uat     → uat    (ungated per current session)
#   stg     → stg    (reviewer-gated)
#   prod    → prod   (reviewer-gated)
#
# `main` is the trunk branch and is NOT a deploy target. Promotion is
# main → develop → uat → stg → prod; ladder-guard.yml enforces PR sources.
#
# Pipeline: typecheck → test → build → publish-to-kv → deploy Worker → smoke.
# (R2 bucket uploads removed in v2.5.0 — ADR-011 consolidated all storage to KV.)

on:
  push:
    branches: [prod, stg, uat, develop]
  workflow_dispatch:
    inputs:
      env:
        description: "Which environment to deploy"
        required: true
        type: choice
        options: [dev, uat, stg, prod]

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.pick.outputs.env_name }}
      wrangler_env: ${{ steps.pick.outputs.wrangler_env }}
    steps:
      - id: pick
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            E="${{ inputs.env }}"
          else
            case "${{ github.ref_name }}" in
              prod)    E=prod ;;
              stg)     E=stg  ;;
              uat)     E=uat  ;;
              develop) E=dev  ;;
              *) echo "No env mapping for branch ${{ github.ref_name }}"; exit 1 ;;
            esac
          fi

          case "$E" in
            prod) WRANGLER_ENV=""    ;;
            stg)  WRANGLER_ENV="stg" ;;
            uat)  WRANGLER_ENV="uat" ;;
            dev)  WRANGLER_ENV="dev" ;;
          esac

          echo "env_name=$E"                >> "$GITHUB_OUTPUT"
          echo "wrangler_env=$WRANGLER_ENV" >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ needs.resolve.outputs.env_name }}
    env:
      WRANGLER_ENV: ${{ needs.resolve.outputs.wrangler_env }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build widget bundle
        run: npm run build:lib

      - name: Compute SRI hash (AC-26.9)
        run: npm run build:sri

      - name: Check build outputs
        run: |
          # Per ADR-011, ukraineBills.json is a build-time import (bundled
          # into the IIFE by Vite, NOT a separately-fetched asset), and
          # ukraineVotes.json was removed entirely — vote data lives in KV
          # via publish-to-kv.ts. So Worker Sites only ships the bundle and
          # its SRI sidecar; both must exist.
          test -f dist/voter-info-widget.iife.js     || (echo "widget bundle missing" && exit 1)
          test -f dist/voter-info-widget.iife.js.sri || (echo "SRI sidecar missing" && exit 1)

      - name: Publish atomic records to KV
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: npx tsx scripts/publish-to-kv.ts --env ${{ needs.resolve.outputs.env_name }}

      # D1 migrations are idempotent — wrangler tracks applied migrations in
      # the d1_migrations table and only runs new ones. Safe to run every deploy.
      # continue-on-error until CLOUDFLARE_API_TOKEN gets D1 Edit permission
      # added — the token currently has Worker scope only and 7403s on D1 calls.
      - name: Apply D1 migrations
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply D1_VOTER_INFO --remote ${{ env.WRANGLER_ENV && format('--env {0}', env.WRANGLER_ENV) || '' }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ${{ env.WRANGLER_ENV && format('--env {0}', env.WRANGLER_ENV) || '' }}

      # Seed is idempotent (upsert with ON CONFLICT, short-circuits when roster
      # exists). Auto-runs every deploy so a fresh env never lands empty.
      # continue-on-error so a misconfigured CF Access service token doesn't
      # block deploys — admin UI Re-sync button is the manual fallback.
      - name: Seed ingest roster
        continue-on-error: true
        env:
          ENV_NAME: ${{ needs.resolve.outputs.env_name }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        shell: bash
        run: |
          case "$ENV_NAME" in
            prod) HOST="https://vote.cogs.it.com";     AUTH=() ;;
            stg)  HOST="https://stg.vote.cogs.it.com"; AUTH=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            uat)  HOST="https://uat.vote.cogs.it.com"; AUTH=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            dev)  HOST="https://dev.vote.cogs.it.com"; AUTH=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
          esac
          curl -sS -fX POST "$HOST/api/admin/ingest/seed" "${AUTH[@]}" \
            -H "Content-Type: application/json" -d "{}" --max-time 120

      - name: Post-deploy smoke
        env:
          ENV_NAME: ${{ needs.resolve.outputs.env_name }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        shell: bash
        run: |
          case "$ENV_NAME" in
            prod) HOST="https://vote.cogs.it.com"; AUTH_HEADERS=() ;;
            dev)  HOST="https://dev.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            uat)  HOST="https://uat.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            stg)  HOST="https://stg.vote.cogs.it.com"
                  AUTH_HEADERS=(-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET") ;;
            *) echo "Unknown ENV_NAME=$ENV_NAME"; exit 1 ;;
          esac

          if [[ "$ENV_NAME" != "prod" && -z "$CF_ACCESS_CLIENT_ID" ]]; then
            echo "::error::CF_ACCESS_CLIENT_ID not set — non-prod smoke will hit Access challenge"
            exit 1
          fi

          # DIAGNOSTIC — when a smoke curl fails on non-prod, we want to
          # see why Access rejected it. Print the full response headers
          # for one probe up front; CF Access populates cf-access-request-id,
          # cf-ray, and a detail body that identifies token/policy/IP issues.
          # Purely informational — the real smoke runs below.
          if [[ "$ENV_NAME" != "prod" ]]; then
            echo "--- DIAGNOSTIC: Access probe on $HOST ---"
            curl -sS -D /tmp/probe-hdrs.txt -o /tmp/probe-body.txt "${AUTH_HEADERS[@]}" "$HOST/voter-info-widget.iife.js.sri" || true
            cat /tmp/probe-hdrs.txt | head -40
            echo "--- body (first 400 chars) ---"
            head -c 400 /tmp/probe-body.txt || true
            echo
            echo "--- end diagnostic ---"
          fi

          echo "Smoking $HOST"

          # 1-4: Origin-gated API checks — PROD ONLY.
          #
          # Non-prod envs (dev/uat/stg) intentionally set `PREVIEW_MODE=true`
          # which bypasses the Origin allowlist entirely — CF Access is the
          # gate instead. That means sending `Origin: https://trackukraine.com`
          # against a non-prod Worker does NOT exercise meaningful policy, and
          # the Worker's runtime behavior under PREVIEW_MODE has its own wart
          # (see follow-up: even with env.PREVIEW_MODE deployed as "true",
          # the Worker 403s on /api/* with a non-whitelisted Origin pattern
          # in some request shapes). Until that's root-caused, the non-prod
          # smoke only asserts the bits that are actually meaningful non-prod:
          # the Worker deployed, static assets shipped, security headers set.
          if [[ "$ENV_NAME" == "prod" ]]; then
            # 1. API proxies with allowed Origin (Census geocoder)
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
              -H "Origin: https://trackukraine.com" \
              "$HOST/api/census/geocoder/geographies/onelineaddress?address=1600+Pennsylvania+Ave+NW+Washington+DC+20500&benchmark=Public_AR_Current&vintage=Current_Current&format=json")
            if [[ "$STATUS" != "200" ]]; then
              echo "::error::Census API returned $STATUS (expected 200)"; exit 1
            fi

            # 2. KV-backed /api/name-search returns 200 for a known query
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
              -H "Origin: https://trackukraine.com" \
              "$HOST/api/name-search?q=durb")
            if [[ "$STATUS" != "200" ]]; then
              echo "::error::name-search returned $STATUS (expected 200)"; exit 1
            fi

            # 3. Origin enforcement — disallowed origin must 403.
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
              -H "Origin: https://evil.example.com" "$HOST/api/census/x")
            if [[ "$STATUS" != "403" ]]; then
              echo "::error::Disallowed origin returned $STATUS (expected 403)"; exit 1
            fi

            # 4. Non-v3 congress path must 400 (AC-27.6).
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" \
              -H "Origin: https://trackukraine.com" "$HOST/api/congress/admin")
            if [[ "$STATUS" != "400" ]]; then
              echo "::error::Non-v3 congress path returned $STATUS (expected 400)"; exit 1
            fi
          fi

          # 5. AC-26.11 — bundle + SRI sidecar MUST return 200. Curated
          #    JSON is bundled into the IIFE at build time (ukraineBills.json)
          #    or moved to KV (ukraineVotes.json) per ADR-011; neither is a
          #    separately-fetched Worker Sites asset anymore.
          for key in voter-info-widget.iife.js voter-info-widget.iife.js.sri; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "${AUTH_HEADERS[@]}" "$HOST/$key")
            if [[ "$STATUS" != "200" ]]; then
              echo "::error::Static asset /$key returned $STATUS (expected 200) — deploy is missing this file"; exit 1
            fi
          done

          # 6. AC-26.12 — the bundle response MUST pass through the Worker's
          #    applySecurityHeaders baseline (HSTS is the canonical marker).
          #    If STS is missing, something else in CF is shadowing /voter-info-widget.iife.js
          #    (Pages binding, Transform Rule, stale R2 public URL) and AC-26.12 is violated.
          STS=$(curl -sS -I "${AUTH_HEADERS[@]}" "$HOST/voter-info-widget.iife.js" | tr -d '\r' | grep -i '^strict-transport-security:' || true)
          if [[ -z "$STS" ]]; then
            echo "::error::Bundle response is missing Strict-Transport-Security — a non-Worker serving path is shadowing /voter-info-widget.iife.js (AC-26.12)"; exit 1
          fi

          echo "Smoke passed for $ENV_NAME @ $HOST"
