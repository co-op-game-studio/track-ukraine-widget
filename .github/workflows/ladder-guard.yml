name: Ladder Guard

# Enforces the main → develop → uat → stg → prod promotion rotation.
# `main` is trunk (source of truth); the four deploy branches form a ladder
# where each rung's source must be the immediately-preceding rung.
# Hotfix PRs can be named `hotfix/*` to bypass (for emergency prod patches);
# those still require reviewer approval via branch protection.

on:
  pull_request:
    branches: [develop, uat, stg, prod]

jobs:
  check-source:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is valid for this base
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD → $BASE"
          case "$BASE" in
            develop)
              if [[ "$HEAD" == "main" || "$HEAD" == hotfix/* ]]; then
                echo "✓ main or hotfix/* → develop is allowed"
                exit 0
              fi
              echo "::error::PR into develop must come from 'main' or 'hotfix/*' (got '$HEAD')"
              exit 1 ;;
            uat)
              if [[ "$HEAD" == "develop" || "$HEAD" == hotfix/* ]]; then
                echo "✓ develop or hotfix/* → uat is allowed"
                exit 0
              fi
              echo "::error::PR into uat must come from 'develop' or 'hotfix/*' (got '$HEAD')"
              exit 1 ;;
            stg)
              if [[ "$HEAD" == "uat" || "$HEAD" == hotfix/* ]]; then
                echo "✓ uat or hotfix/* → stg is allowed"
                exit 0
              fi
              echo "::error::PR into stg must come from 'uat' or 'hotfix/*' (got '$HEAD')"
              exit 1 ;;
            prod)
              if [[ "$HEAD" == "stg" || "$HEAD" == hotfix/* ]]; then
                echo "✓ stg or hotfix/* → prod is allowed"
                exit 0
              fi
              echo "::error::PR into prod must come from 'stg' or 'hotfix/*' (got '$HEAD')"
              exit 1 ;;
            *)
              echo "Unknown base branch: $BASE"; exit 1 ;;
          esac
