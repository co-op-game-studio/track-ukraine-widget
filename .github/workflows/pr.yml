name: PR Checks

on:
  pull_request:
    branches: [main]
  # Also run on pushes directly to main so a bypassed merge still gets checked
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Main PR check — runs the full FR-44 test ladder + coverage floors +
  # bundle-size check + build. Surfaces as the GH check context
  # `lint-typecheck-test` (same as pre-2026-04-19, so branch protection
  # keeps working). The distinct `check-source` context is emitted by
  # ladder-guard.yml — see ops/branch-protection memory.
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (widget + worker)
        run: npm run typecheck

      # FR-44 test ladder — unit, integration, and e2e tests ALL run in CI.
      # vitest auto-picks them up via the `include: ['tests/**/*.test.{ts,tsx}']`
      # glob in vitest.config.ts; no test is silently skipped.
      - name: Unit tests (FR-44 tier 1)
        run: npx vitest run tests/unit

      - name: Integration tests (FR-44 tier 2)
        run: npx vitest run tests/integration

      - name: End-to-end tests (FR-44 tier 3)
        run: npx vitest run tests/e2e

      # Coverage with the FR-45 floor enforcement. If any tier drops below
      # the floor declared in vitest.config.ts, the job fails. Also uploads
      # the combined report as an artifact so reviewers can see deltas.
      - name: Coverage (combined, FR-45 thresholds enforced)
        run: npx vitest run --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage/combined/
          retention-days: 14

      - name: Build widget bundle
        run: npm run build:lib

      - name: Compute SRI hash (AC-26.9)
        run: npm run build:sri

      - name: Bundle size check (< 400 KB gzipped)
        run: |
          SIZE=$(gzip -c dist/voter-info-widget.iife.js | wc -c)
          echo "Gzipped bundle size: $SIZE bytes"
          # NFR-4 revised: 400 KB ceiling covers React runtime + inlined bill
          # metadata. The larger roster dataset is served separately via R2
          # (AC-24.6). Current measured bundle: ~310 KB gzipped.
          if [ $SIZE -gt 409600 ]; then
            echo "❌ Bundle exceeds 400 KB gzipped (spec NFR-4)"
            exit 1
          fi
          echo "✅ Bundle under 400 KB gzipped"
