name: Publish D1 → KV

# FR-51 AC-51.8 — projects D1 admin tables into KV read-snapshot keys.
# Cron runs against dev + uat every 15 minutes; stg + prod are manual via
# workflow_dispatch to keep deploy-ladder discipline.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - uat
          - stg
          - prod
      dry_run:
        description: 'Dry run (do not write KV)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Cron runs target dev + uat. Manual runs override via the
        # workflow_dispatch input filter at the step level.
        env: ${{ github.event_name == 'schedule' && fromJSON('["dev","uat"]') || fromJSON(format('["{0}"]', inputs.env)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run publish-d1-to-kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/publish-d1-to-kv.ts --env ${{ matrix.env }} --dry-run
          else
            npx tsx scripts/publish-d1-to-kv.ts --env ${{ matrix.env }}
          fi

      # FR-55 AC-55.6 / ADR-018 §6 — recompute the per-party Ukraine-score
      # means and write them to scores:v1:party-priors. The Worker's
      # member read-through stamps this onto every member:v1:* record.
      # Same publish cadence as the D1 projection.
      #
      # Depends on src/data/ukraineVotes.json (per-roll-call rosters) which
      # is generated by `npm run curate:rosters`. Build it inline first so
      # the priors are computed against fresh roster data — same upstream
      # source publish-to-kv uses for KV roll-call-roster:v1:* records.
      - name: Build roll-call rosters
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: npx tsx scripts/build-vote-rosters.ts

      - name: Compute party priors
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/compute-party-priors.ts --env ${{ matrix.env }} --dry-run
          else
            npx tsx scripts/compute-party-priors.ts --env ${{ matrix.env }}
          fi
