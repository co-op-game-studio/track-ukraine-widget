<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voter Info Widget — Example Embed</title>
    <style>
      body { font-family: system-ui; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
      h1 { color: #111; }
      .host-style-leak-test { color: red; font-weight: bold; }
    </style>
  </head>
  <body>
    <h1>Example Host Page</h1>
    <p class="host-style-leak-test">
      This red bold text proves the host's CSS doesn't leak into the widget (Shadow DOM).
    </p>

    <voter-info-widget api-base="http://localhost:8787"></voter-info-widget>

    <!--
      Local development: this script tag loads the built bundle from the
      sibling `dist/` directory. No SRI in local dev because the hash
      changes on every `npm run build`.
    -->
    <script src="../dist/voter-info-widget.iife.js"></script>

    <!--
      Production embed snippet (FR-26 AC-26.10) — SRI-pinned form:

        <script
          src="https://vote.cogs.it.com/voter-info-widget.iife.js"
          integrity="sha384-REPLACE_WITH_CURRENT_HASH"
          crossorigin="anonymous"
          async
        ></script>

      Fetch the current release hash from:
        https://vote.cogs.it.com/voter-info-widget.iife.js.sri
    -->
  </body>
</html>
