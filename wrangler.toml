# wrangler.toml — Cloudflare Worker deployment config
#
# Four-environment layout (FR-26):
#   dev   → dev.vote.cogs.it.com   (branch: develop)
#   uat   → uat.vote.cogs.it.com   (branch: uat)
#   stg   → stg.vote.cogs.it.com   (branch: stg)
#   prod  → vote.cogs.it.com       (branch: prod)
#
# Per-env routes (identical across envs — only origin CORS, KV namespace,
# and PREVIEW_MODE differ):
#     /api/census/*               → proxies to geocoding.geo.census.gov
#     /api/congress/*             → proxies to api.congress.gov
#     /api/senate/*               → proxies to www.senate.gov
#     /api/members/{bioguideId}   → reads member:v1:* from KV (read-through)
#     /api/name-search?q=...      → reads name-index:v1:* from KV
#     /api/bills/{billId}         → reads bill:v1:* from KV
#     /api/roll-calls/c/s/r/rc    → reads roll-call:v1:* from KV
#     /                           → preview HTML on non-prod (PREVIEW_MODE=true);
#                                   301 → trackukraine.com on prod
#     /voter-info-widget.iife.js  → Worker Sites static asset
#     else                        → 404
#
# CONGRESS_API_KEY is a Worker secret set per-env:
#   wrangler secret put CONGRESS_API_KEY --env <name>

name = "voter-info-widget-proxy"
main = "proxy/worker.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

# ─── PROD (default, branch: prod) ────────────────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
ENV_NAME = "prod"

[[kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "72d3dbce1a1d4ea4aec74b305d7995e6"

# AC-27.21 — in-Worker per-IP rate limit. Opening a rep's detail fans out
# to ~30 upstream cache-fill requests (house-vote member rolls + senate
# XML per curated vote + member profile reads). 300/60s lets a single
# visitor open multiple reps without 429 while still gating abuse.
# Zone-level rule in AC-28.3 provides defense-in-depth. See ADR-010.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 300, period = 60 }

[observability]
enabled = true

# ─── DEV (branch: develop) ───────────────────────────────────────────────────
[env.dev]
name = "voter-info-widget-proxy-dev"

[env.dev.vars]
# PREVIEW_MODE bypasses Origin allowlist (Access is the gate). ALLOWED_ORIGINS
# stays set so enforcement behavior matches prod if PREVIEW_MODE were removed.
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
ALLOW_LOCALHOST = "true"
PREVIEW_MODE = "true"
ENV_NAME = "dev"

[env.dev.assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

[[env.dev.kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "743b2feda53648cd8242d3b89538bfac"

# Dev: 600 req / 60 s / IP — local harnesses iterate fast.
[[env.dev.unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 600, period = 60 }

[env.dev.observability]
enabled = true

# ─── UAT (branch: uat) ───────────────────────────────────────────────────────
[env.uat]
name = "voter-info-widget-proxy-uat"

[env.uat.vars]
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
PREVIEW_MODE = "true"
ENV_NAME = "uat"

[env.uat.assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

[[env.uat.kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "3756142363984d218d5f489151716b30"

# UAT: 60 req / 60 s / IP — reviewers need a looser budget than prod.
[[env.uat.unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 60, period = 60 }

[env.uat.observability]
enabled = true

# ─── STG (branch: stg) ───────────────────────────────────────────────────────
[env.stg]
name = "voter-info-widget-proxy-stg"

[env.stg.vars]
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
PREVIEW_MODE = "true"
ENV_NAME = "stg"

[env.stg.assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

[[env.stg.kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "4ff9a8e54b82489fb9a300466bd68686"

# Stg: 300 req / 60 s / IP. A single RepDetail opens ~30 upstream
# cache-fill requests (house-vote member rolls + senate XML per curated
# vote + member profile reads). 300/60s lets a single visitor open
# several reps in succession without 429, while still gating abuse.
# Mirrors the intended prod posture (FR-30 AC-30.1).
[[env.stg.unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 300, period = 60 }

[env.stg.observability]
enabled = true

# ─── Local preview (wrangler dev) ────────────────────────────────────────────
[env.preview]
name = "voter-info-widget-proxy-preview"

[env.preview.vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:4173,http://127.0.0.1:5173"
ALLOW_LOCALHOST = "true"
PREVIEW_MODE = "true"
ENV_NAME = "preview"

[env.preview.assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

[[env.preview.kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "743b2feda53648cd8242d3b89538bfac"

# Preview: 600 req / 60 s / IP — same posture as dev.
[[env.preview.unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1005"
simple = { limit = 600, period = 60 }
