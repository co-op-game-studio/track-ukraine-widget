# wrangler.toml — Cloudflare Worker deployment config
#
# Four-environment layout (FR-26):
#   dev   → dev.vote.cogs.it.com   (branch: develop)
#   uat   → uat.vote.cogs.it.com   (branch: uat)
#   stg   → stg.vote.cogs.it.com   (branch: stg)
#   prod  → vote.cogs.it.com       (branch: prod)
#
# Per-env routes (identical across envs — only origin CORS, KV namespace,
# and PREVIEW_MODE differ):
#     /api/census/*               → proxies to geocoding.geo.census.gov
#     /api/congress/*             → proxies to api.congress.gov
#     /api/senate/*               → proxies to www.senate.gov
#     /api/members/{bioguideId}   → reads member:v1:* from KV (read-through)
#     /api/name-search?q=...      → reads name-index:v1:* from KV
#     /api/bills/{billId}         → reads bill:v1:* from KV
#     /api/roll-calls/c/s/r/rc    → reads roll-call:v1:* from KV
#     /                           → preview HTML on non-prod (PREVIEW_MODE=true);
#                                   301 → trackukraine.com on prod
#     /voter-info-widget.iife.js  → Worker Sites static asset
#     else                        → 404
#
# CONGRESS_API_KEY is a Worker secret set per-env:
#   wrangler secret put CONGRESS_API_KEY --env <name>

name = "voter-info-widget-proxy"
main = "proxy/worker.ts"
compatibility_date = "2025-01-01"

# FR-50 AC-50.1 (V4 — admin auth at the edge): disable the
# `*.workers.dev` subdomain so the Worker is unreachable outside the
# zone hostname where Cloudflare Access enforces auth on /admin and
# /api/admin/*. Without this, an attacker could hit
# `voter-info-widget-proxy.<acct>.workers.dev/api/admin/...` and the
# Access app would not gate the request — they'd still be blocked by
# the Worker's JWT verify, but the admin path's existence would be
# leaked. Belt and suspenders.
workers_dev = false
preview_urls = false

[assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

# ─── PROD (default, branch: prod) ────────────────────────────────────────────
[vars]
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
ENV_NAME = "prod"
# FR-50 AC-50.2 — Cloudflare Access team subdomain + Application AUD tag
# for JWT verification. Both are non-secret routing identifiers (NFR-7.2):
# the team subdomain is public; the AUD tag is a 64-hex-char identifier
# from the CF Access dashboard. Set these per env from the CF dashboard
# once the Access app is provisioned. Empty values cause admin routes
# to return 500 admin_misconfigured (fail-loud).
CF_ACCESS_TEAM = "coopgames"
CF_ACCESS_AUD = "ed8776c235a184c9548d99ca685f0fc40f4599f3fc46971426dd96cdc24700ed"
# FR-59 — admin client poll fan-out concurrency. Cap parallel /poll-handle
# requests per session. Prod: conservative to stay under Worker subrequest
# budget and upstream API rate limits.
POLL_CONCURRENCY = "4"
# FR-59 — social poll cron schedule (mirror of [triggers].crons below).
# CF Workers don't expose trigger schedules to runtime code, so this env var
# is the single source of truth for the staleness window: handles polled
# within (interval - 5min) are skipped to avoid double-pulls.
SOCIAL_POLL_CRON = "0 6 * * *"

[[kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "72d3dbce1a1d4ea4aec74b305d7995e6"

# FR-49 AC-49.1 — D1 database for the V4 admin backend.
# Provisioned per env (run `wrangler d1 create viw_researcher_<env>` once
# per env, then paste the database_id below). Migrations live in
# `migrations/d1/` and are applied via
# `wrangler d1 migrations apply --env <env>`.
[[d1_databases]]
binding = "D1_VOTER_INFO"
database_name = "viw_researcher_prod"
database_id = "d22db275-7b64-472a-873b-76dd97020603"
migrations_dir = "migrations/d1"

# FR-41 — R2 static archive bucket for byte-level-static upstream responses
# (closed-session Senate XML, House rosters, aged bill-actions/summaries).
# Must be provisioned via `wrangler r2 bucket create voter-info-widget-archive-prod`
# BEFORE deploy; worker fails fast if binding configured but bucket absent
# (AC-41.11). Binding name R2_STATIC is distinct from the retired R2_ASSETS
# (ADR-011) which served static widget bundles and has been fully replaced
# by Worker Sites.
[[r2_buckets]]
binding = "R2_STATIC"
bucket_name = "voter-info-widget-archive-prod"

# AC-27.21 (RE-TIGHTENED v2.5.3) — in-Worker per-IP rate limit. After
# ADR-012 moved roll-call rosters and state-members into KV, per-visit
# fan-out dropped from ~70 req (v2.5.2 interim) to ~49 req worst case
# (all KV reads). 60/60s covers one visitor opening all three reps with
# headroom for re-navigation; anything above is hostile or a stuck
# client. Zone rule in AC-28.3 is the 2x outer gate.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# FR-38 AC-38.1 — Workers Analytics Engine binding per env.
# Dataset names follow the `voter_info_widget_${env}` convention so a single
# query in the CF dashboard can slice across envs via the `env` blob field.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "voter_info_widget_prod"

[triggers]
crons = ["0 6 * * *"]

# ─── DEV (branch: develop) ───────────────────────────────────────────────────
[env.dev]
name = "voter-info-widget-proxy-dev"

[env.dev.vars]
# PREVIEW_MODE bypasses Origin allowlist (Access is the gate). ALLOWED_ORIGINS
# stays set so enforcement behavior matches prod if PREVIEW_MODE were removed.
ALLOWED_ORIGINS = "https://trackukraine.com,https://www.trackukraine.com"
ALLOW_LOCALHOST = "true"
PREVIEW_MODE = "true"
ENV_NAME = "dev"
CF_ACCESS_TEAM = "coopgames"
CF_ACCESS_AUD = "ed8776c235a184c9548d99ca685f0fc40f4599f3fc46971426dd96cdc24700ed"
# Dev: conservative fan-out so testing doesn't burn through YouTube
# daily quota. Frontend additionally paces requests at ~250ms each, so total
# rate stays well under every provider's per-second limit.
POLL_CONCURRENCY = "2"
SOCIAL_POLL_CRON = "0 6 * * *"

[env.dev.assets]
directory = "./dist"
not_found_handling = "none"
binding = "ASSETS"
run_worker_first = true

[[env.dev.kv_namespaces]]
binding = "KV_VOTER_INFO"
id = "743b2feda53648cd8242d3b89538bfac"

[[env.dev.d1_databases]]
binding = "D1_VOTER_INFO"
database_name = "viw_researcher_dev"
database_id = "05e0fc19-127c-4a7e-9708-1055996b134c"
migrations_dir = "migrations/d1"

[[env.dev.r2_buckets]]
binding = "R2_STATIC"
bucket_name = "voter-info-widget-archive-dev"

# Dev: 600 req / 60 s / IP — local harnesses iterate fast.
[[env.dev.unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 600, period = 60 }

[env.dev.observability]
enabled = true

[env.dev.observability.logs]
enabled = true
invocation_logs = true

[env.dev.observability.traces]
enabled = true

[[env.dev.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "voter_info_widget_dev"

# AC-52.49 — social-feed freshness cron. Daily at 06:00 UTC; YouTube quota
# is budget-bound so pulling more often burns quota for marginal new posts.
# Manual re-poll per person is always available from the profile page.
[env.dev.triggers]
# Daily at 06:00 UTC. Social feeds don't change fast enough to justify hourly,
# and YouTube quota is budget-bound — pulling N times a day burns through
# quota for marginal new posts. Manual re-poll on a specific person is always
# available from the profile.
crons = ["0 6 * * *"]

